<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financiero | Portal de Sistemas LGC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style/style.css">
<link rel="icon" href="img/logo-la-gran-colombia.png">
</head>
<body>

  <header class="app-header">
    <div class="app-header__brand">
      <img class="app-header__logo" src="img/logo-la-gran-colombia.png" alt="La Gran Colombia Supermercados">
      <span class="app-header__title">Financiero<small>Portal de Sistemas</small></span>
    </div>
    <a class="btn-volver" href="index.html">&larr; Volver al inicio</a>
  </header>

  <main class="app-main">
    <section class="app-card">
      <div class="app-card__icon">$</div>
      <h1 class="app-card__title">Financiero</h1>
      <p class="app-card__desc">Videos de capacitación del área financiera y contable.</p>

      <div class="video-grid" id="videoGrid"></div>
    </section>
  </main>

  <!-- Reproductor personalizado: solo Play/Pausa y Pantalla completa -->
  <div class="player-modal" id="playerModal" aria-hidden="true">
    <div class="player-modal__backdrop" id="playerBackdrop"></div>
    <div class="player-modal__panel">
      <button class="player-modal__close" id="playerClose" aria-label="Cerrar video">&times;</button>
      <p class="player-modal__title" id="playerTitle"></p>
      <div class="player-wrap" id="playerWrap">
        <iframe id="playerIframe" src="" title="Reproductor de video" allow="autoplay; fullscreen; encrypted-media"></iframe>
        <div class="player-controls">
          <button class="player-btn" id="btnPlayPause" aria-label="Reproducir">▶</button>
          <button class="player-btn player-btn--fullscreen" id="btnFullscreen" aria-label="Pantalla completa">⛶</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/videos-financiero.js"></script>
  <script src="js/player.js"></script>
    <!-- Fin bloque Video -->

  
</body>
</html>
