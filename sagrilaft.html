<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGRILAFT | Portal de Sistemas LGC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="style/style.css">
<link rel="icon" href="img/logo-la-gran-colombia.png">
</head>
<body>

  <header class="app-header">
    <div class="app-header__brand">
      <img class="app-header__logo" src="img/logo-la-gran-colombia.png" alt="La Gran Colombia Supermercados">
      <span class="app-header__title">SAGRILAFT<small>Portal de Sistemas</small></span>
    </div>
    <a class="btn-volver" href="index.html">&larr; Volver al inicio</a>
  </header>

  <main class="app-main">
    <section class="app-card">

      <div class="app-card__icon sagrilaft-icon">🛡️</div>
      <h1 class="app-card__title">COMPLIANCE</h1>
      <p class="app-card__desc">Gestión de Riesgos y Cultura de Cumplimiento</p>

      <!-- ── SECCIÓN 1: VIDEOS ───────────────────────── -->
      <div class="video-grid" id="videoGrid"></div>

      <!-- ── SECCIÓN 2: MANUALES ────────────────────── -->
      <section class="doc-section" id="docSection">
        <h2 class="doc-section__title">Píldoras de conocimiento</h2>
        <div class="video-grid" id="docGrid"></div>
      </section>

      <!-- ── SECCIÓN 3: ENCUESTAS ───────────────────── -->
      <section class="encuesta-section" id="encuestaSection">
        <h2 class="doc-section__title encuesta-section__title">Encuestas</h2>
        <p class="encuesta-section__desc">Completa el formulario según corresponda al Sistema o Programa.</p>
        <div class="encuesta-grid" id="encuestaGrid"></div>
      </section>

    </section>
  </main>

  <!-- Reproductor de videos personalizado -->
  <div class="player-modal" id="playerModal" aria-hidden="true">
    <div class="player-modal__backdrop" id="playerBackdrop"></div>
    <div class="player-modal__panel">
      <button class="player-modal__close" id="playerClose" aria-label="Cerrar video">&times;</button>
      <p class="player-modal__title" id="playerTitle"></p>
      <div class="player-wrap" id="playerWrap">
        <iframe id="playerIframe" src="" title="Reproductor de video" allow="autoplay; fullscreen; encrypted-media"></iframe>
        <div class="player-controls">
          <button class="player-btn" id="btnPlayPause" aria-label="Reproducir">▶</button>
          <button class="player-btn player-btn--fullscreen" id="btnFullscreen" aria-label="Pantalla completa">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Visor de manuales PDF protegido -->
  <div class="player-modal" id="pdfModal" aria-hidden="true">
    <div class="player-modal__backdrop" id="pdfBackdrop"></div>
    <div class="player-modal__panel">
      <button class="player-modal__close" id="pdfClose" aria-label="Cerrar documento">&times;</button>
      <p class="player-modal__title" id="pdfTitle"></p>
      <div class="pdf-viewer__frame">
        <p class="pdf-viewer__loading" id="pdfLoading">Cargando documento...</p>
        <canvas id="pdfCanvas" hidden></canvas>
      </div>
      <div class="pdf-viewer__controls">
        <button class="player-btn" id="pdfPrev" aria-label="Página anterior">‹</button>
        <span class="pdf-viewer__page-info" id="pdfPageInfo"></span>
        <button class="player-btn" id="pdfNext" aria-label="Página siguiente">›</button>
      </div>
    </div>
  </div>

  <script src="js/videos-sagrilaft.js"></script>
  <script src="js/docs-sagrilaft.js"></script>
  <script src="js/encuestas-sagrilaft.js"></script>
  <script src="js/player.js"></script>
  <script src="js/pdf-viewer.js"></script>
  <script src="js/encuestas.js"></script>
</body>
</html>
